extend type BlogComment {
  blogCommentId: Int
  postId: Int
  email: String
  status: String!
  postName: String
  moderateApi: String!
  deleteApi: String!
}

type BlogCommentCollection {
  items: [BlogComment!]!
  currentPage: Int!
  total: Int!
  currentFilters: [Filter]
}

extend type Query {
  blogComments(filters: [FilterInput]): BlogCommentCollection
}
